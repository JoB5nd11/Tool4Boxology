services:
  # Production build
  boxology-interface:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: boxology-interface
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - boxology-network
    labels:
      - "com.docker.compose.project=boxology-interface"

  # Development build (optional)
  boxology-interface-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: boxology-interface-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - boxology-network
    command: npm run dev -- --host 0.0.0.0
  
  boxology_kg:
    container_name: boxology_kg
    image: kemele/virtuoso:7-stable
    restart: unless-stopped
    ports:
      - "8890:8890"
    volumes:
      - kg_data:/data
    networks:
      - boxology-network

networks:
  boxology-network:
    driver: bridge
